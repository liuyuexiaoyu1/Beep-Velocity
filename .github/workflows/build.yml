name: _step.build_velocity

on:
  workflow_call:
    inputs:
      release:
        type: boolean
        required: false
        default: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'maven'

      - name: Build with Maven
        run: |
          mvn clean package -B ${{ inputs.build_args }}
        env:
          BUILD_ID: ${{ github.run_number }}
          BUILD_RELEASE: ${{ inputs.release }}

      - name: Collect plugin jars
        run: |
          mkdir -p plugin-jars
          find target/ -maxdepth 1 -type f -name "*.jar" ! -name "original-*" -exec cp {} plugin-jars/ \;
          echo "Checking collected jars:"
          ls -l plugin-jars

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: velocity-plugin-jar
          path: plugin-jars/*.jar